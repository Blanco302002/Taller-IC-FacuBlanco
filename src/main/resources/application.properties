spring.application.name=Taller-IC-FacuBlanco

# === Conexion a Supabase (PostgreSQL) ===
# Los valores se toman de variables de entorno para NO hardcodear credenciales.
# Configuralas en tu maquina (o en los secrets) antes de correr la app:
#   SUPABASE_DB_URL=jdbc:postgresql://<host>:5432/postgres
#   SUPABASE_DB_USER=postgres
#   SUPABASE_DB_PASSWORD=<tu-password>
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Crea/actualiza el esquema a partir de las entidades JPA.
# (Para produccion lo ideal es migraciones con Flyway/Liquibase.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
